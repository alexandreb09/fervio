name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend build ────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      # ── SSH setup ─────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── Backend deploy (git pull + composer + migrations) ─────
      - name: Deploy backend
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "bash /homez.2212/teensgg/alex/deploy.sh"

      # ── Frontend deploy (rsync built dist/) ───────────────────
      - name: Deploy frontend
        run: |
          rsync -az --delete \
            frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/homez.2212/teensgg/alex/www/
